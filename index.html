<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sát Hạch Đường Trường - Trung Tâm GDNN GTVT An Giang</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Khu vực hiển thị Logo và Tiêu đề */
        .header-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-area .logo {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        h1 {
            color: #1a73e8;
            margin: 0;
            font-size: 1.4em;
            line-height: 1.4;
            text-transform: uppercase;
        }
        .gps-panel {
            background: #202124;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .gps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .gps-box {
            background: #303134;
            padding: 15px;
            border-radius: 8px;
        }
        .gps-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4ee44e;
            margin-top: 5px;
        }
        .gps-status {
            font-size: 0.9em;
            color: #bdc1c6;
            margin-bottom: 5px;
        }
        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        .exam-card {
            border: 2px solid #dadce0;
            padding: 12px;
            border-radius: 8px;
            background: #fafafa;
        }
        .exam-card.active {
            border-color: #1a73e8;
            background-color: #f4f8ff;
        }
        
        /* --- ĐỊNH DẠNG CÁC NÚT BẤM LỚN THEO CHUẨN UI --- */
        .start-btn {
            width: 100%;
            padding: 18px 10px;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16);
            transition: background 0.2s;
        }

        /* Xuất phát: Xanh lá cây */
        .btn-green { background-color: #2ecc71; }
        .btn-green:active { background-color: #27ae60; }

        /* Tăng tốc: Xanh dương */
        .btn-blue { background-color: #3498db; }
        .btn-blue:active { background-color: #2980b9; }

        /* Giảm tốc: Vàng */
        .btn-yellow { background-color: #f1c40f; color: #2c3e50; }
        .btn-yellow:active { background-color: #f39c12; }

        /* Kết thúc: Đỏ */
        .btn-red { background-color: #e74c3c; }
        .btn-red:active { background-color: #c0392b; }

        .log-panel {
            background: #f1f3f4;
            border: 1px solid #dadce0;
            padding: 12px;
            border-radius: 6px;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="logo.png" alt="Logo Trung Tâm" class="logo">
        <h1>Sát Hạch Đường Trường<br><span style="font-size: 0.85em; color: #5f6368; text-transform: none;">Trung Tâm GDNN GTVT An Giang</span></h1>
    </div>
    
    <div class="gps-panel">
        <div class="gps-status" id="gps-status">📡 Đang khởi động GPS...</div>
        <div class="gps-grid">
            <div class="gps-box">
                <div>TỐC ĐỘ (Thật)</div>
                <div class="gps-value"><span id="live-speed">0.0</span> <span style="font-size:0.5em">km/h</span></div>
            </div>
            <div class="gps-box">
                <div>ĐO ĐOẠN ĐƯỜNG</div>
                <div class="gps-value"><span id="live-distance">0.0</span> <span style="font-size:0.5em">m</span></div>
            </div>
        </div>
    </div>

    <div class="exam-list">
        <div class="exam-card" id="card-1">
            <button class="start-btn btn-green" onclick="startExam(1)">Xuất phát</button>
        </div>

        <div class="exam-card" id="card-2">
            <button class="start-btn btn-blue" onclick="startExam(2)">Tăng số - Tăng tốc</button>
        </div>

        <div class="exam-card" id="card-3">
            <button class="start-btn btn-yellow" onclick="startExam(3)">Giảm số - Giảm tốc</button>
        </div>

        <div class="exam-card" id="card-4">
            <button class="start-btn btn-red" onclick="startExam(4)">Kết thúc</button>
        </div>
    </div>
