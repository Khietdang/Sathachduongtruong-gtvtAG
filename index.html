<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sát Hạch Đường Trường GPS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #1a73e8;
            margin-top: 10px;
            font-size: 1.6em;
        }
        .gps-panel {
            background: #202124;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .gps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .gps-box {
            background: #303134;
            padding: 15px;
            border-radius: 8px;
        }
        .gps-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4ee44e;
            margin-top: 5px;
        }
        .gps-status {
            font-size: 0.9em;
            color: #bdc1c6;
            margin-bottom: 5px;
        }
        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        .exam-card {
            border: 2px solid #dadce0;
            padding: 15px;
            border-radius: 8px;
            background: #fafafa;
        }
        .exam-card.active {
            border-color: #1a73e8;
            background-color: #f4f8ff;
        }
        .exam-card h3 {
            margin: 0 0 8px 0;
            color: #3c4043;
        }
        .exam-card p {
            margin: 5px 0;
            font-size: 0.9em;
            color: #5f6368;
        }
        
        /* --- ĐỊNH DẠNG CÁC NÚT BẤM THEO MÀU SẮC YÊU CẦU --- */
        .start-btn {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 8px;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .start-btn:strong {
            filter: brightness(90%);
        }

        /* Bài 1: Xanh lá cây */
        .btn-green {
            background-color: #2ecc71;
        }
        .btn-green:active { background-color: #27ae60; }

        /* Bài 2: Xanh dương */
        .btn-blue {
            background-color: #3498db;
        }
        .btn-blue:active { background-color: #2980b9; }

        /* Bài 3: Vàng (Chữ đen để dễ nhìn) */
        .btn-yellow {
            background-color: #f1c40f;
            color: #2c3e50;
        }
        .btn-yellow:active { background-color: #f39c12; }
