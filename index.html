<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sát Hạch Đường Trường - Trung Tâm GDNN GTVT An Giang</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-area .logo {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        h1 {
            color: #1a73e8;
            margin: 0;
            font-size: 1.4em;
            line-height: 1.4;
            text-transform: uppercase;
        }
        .gps-panel {
            background: #202124;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .gps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .gps-box {
            background: #303134;
            padding: 15px;
            border-radius: 8px;
        }
        .gps-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4ee44e;
            margin-top: 5px;
        }
        .gps-status {
            font-size: 0.95em;
            color: #bdc1c6;
            margin-bottom: 5px;
            font-weight: 500;
            padding: 6px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .gps-warning {
            color: #ffc107 !important;
            background-color: rgba(255, 193, 7, 0.1);
        }
        .retry-gps-btn {
            background: #ffc107;
            color: #202124;
            border: none;
            padding: 4px 10px;
            font-size: 0.85em;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 5px;
            cursor: pointer;
            display: none;
        }
        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        .exam-card {
            border: 2px solid #dadce0;
            padding: 12px;
            border-radius: 8px;
            background: #fafafa;
        }
        .exam-card.active {
            border-color: #1a73e8;
            background-color: #f4f8ff;
        }
        .start-btn {
            width: 100%;
            padding: 18px 10px;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16);
            transition: background 0.2s;
        }
        .btn-green { background-color: #2ecc71; }
        .btn-green:active { background-color: #27ae60; }
        .btn-blue { background-color: #3498db; }
        .btn-blue:active { background-color: #2980b9; }
        .btn-yellow { background-color: #f1c40f; color: #2c3e50; }
        .btn-yellow:active { background-color: #f39c12; }
        .btn-red { background-color: #e74c3c; }
        .btn-red:active { background-color: #c0392b; }

        .log-panel {
            background: #f1f3f4;
            border: 1px solid #dadce0;
            padding: 12px;
            border-radius: 6px;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="logo.png" alt="Logo Trung Tâm" class="logo">
        <h1>Sát Hạch Đường Trường<br><span style="font-size: 0.85em; color: #5f6368; text-transform: none;">Trung Tâm GDNN GTVT An Giang</span></h1>
    </div>
    
    <div class="gps-panel">
        <div class="gps-status" id="gps-status">📡 Đang khởi động GPS...</div>
        <button class="retry-gps-btn" id="retry-gps-btn" onclick="retryGPS()">🔄 Thử kết nối lại GPS</button>
        
        <div class="gps-grid">
            <div class="gps-box">
                <div>TỐC ĐỘ (Thật)</div>
                <div class="gps-value"><span id="live-speed">0.0</span> <span style="font-size:0.5em">km/h</span></div>
            </div>
            <div class="gps-box">
                <div>ĐO ĐOẠN ĐƯỜNG</div>
                <div class="gps-value"><span id="live-distance">0.0</span> <span style="font-size:0.5em">m</span></div>
            </div>
        </div>
    </div>

    <div class="exam-list">
        <div class="exam-card" id="card-1">
            <button class="start-btn btn-green" onclick="startExam(1)">Xuất phát</button>
        </div>

        <div class="exam-card" id="card-2">
            <button class="start-btn btn-blue" onclick="startExam(2)">Tăng số - Tăng tốc</button>
        </div>

        <div class="exam-card" id="card-3">
            <button class="start-btn btn-yellow" onclick="startExam(3)">Giảm số - Giảm tốc</button>
        </div>

        <div class="exam-card" id="card-4">
            <button class="start-btn btn-red" onclick="startExam(4)">Kết thúc</button>
        </div>
    </div>

    <strong>Nhật ký hành trình:</strong>
    <div class="log-panel" id="log-panel">
        [Hệ thống] Chờ cấp quyền định vị GPS...
    </div>
</div>

<script>
    // --- ĐƯỜNG DẪN FILE MP3 ---
    const audioFiles = {
        xuatPhat: new Audio("xuat-phat.mp3"),
        tangToc: new Audio("tang-toc.mp3"),
        giamToc: new Audio("giam-toc.mp3"),
        ketThuc: new Audio("ket-thuc.mp3"),
        chuaDatTocDo: new Audio("chua-dat-toc-do.mp3"),
        chuaGiamTocDo: new Audio("chua-giam-toc-do.mp3"),
        bip: new Audio("bip.mp3"),
        tintin: new Audio("tintin.mp3")
    };

    Object.keys(audioFiles).forEach(key => {
        audioFiles[key].preload = "auto";
    });

    // Biến kiểm tra hệ thống âm thanh toàn cục đã được mở khóa chưa
    let isAudioUnlocked = false;

    // HÀM SỬA LỖI: Mở khóa bằng một âm thanh trống (im lặng), không đụng vào 4 file mp3 thật
    function unlockAudioSystem() {
        if (isAudioUnlocked) return;
        
        // Tạo luồng phát dữ liệu im lặng cực ngắn để kích hoạt loa trình duyệt công khai
        const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==');
        silentAudio.play().then(() => {
            isAudioUnlocked = true;
            console.log("Hệ thống âm thanh trình duyệt đã mở khóa an toàn.");
        }).catch(err => {
            console.log("Chưa thể mở khóa âm thanh: ", err);
        });
    }

    function playCustomAudio(audioObject) {
        if (!audioObject) return;
        try {
            // Tắt toàn bộ các âm thanh khác đang chạy trước khi phát bài mới để tránh đè tiếng
            Object.keys(audioFiles).forEach(key => {
                audioFiles[key].pause();
                audioFiles[key].currentTime = 0;
            });

            let playPromise = audioObject.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => {
                    console.log("Lỗi chặn phát tự động: ", err);
                });
            }
        } catch (e) {
            console.log("Lỗi thực thi âm thanh: ", e);
        }
    }

    // --- BIẾN ĐỊNH VỊ GPS THỰC TẾ ---
    let lastPosition = null;
    let totalDistanceRun = 0; 
    let currentSpeedKmh = 0;  
    let hasGpsConnected = false;
    let gpsWatchId = null;
    let gpsTimeoutWatcher = null;

    // --- BIẾN THEO DÕI TRẠNG THÁI ---
    let activeLesson = 0;
    let startLessonDistance = 0;
    let startLessonSpeed = 0;
    let isConditionPassed = false;
    let isBeepDone = false;

    function addLog(text) {
        const log = document.getElementById('log-panel');
        log.innerHTML += `<br>• ${text}`;
        log.scrollTop = log.scrollHeight;
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; 
    }

    // THEO DÕI ĐỊNH VỊ GPS
    function startGpsTracking() {
        if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); }
        if (gpsTimeoutWatcher) { clearTimeout(gpsTimeoutWatcher); }

        gpsTimeoutWatcher = setTimeout(() => {
            if (!hasGpsConnected) {
                const gpsStatusEl = document.getElementById('gps-status');
                gpsStatusEl.innerText = "⏳ Khởi động lâu... Hãy kiểm tra quyền Vị Trí / Ra nơi trống trải";
                gpsStatusEl.classList.add('gps-warning');
                document.getElementById('retry-gps-btn').style.display = "inline-block";
                addLog("[Cảnh báo] Chưa nhận được tín hiệu GPS. Hãy bấm thử lại hoặc kiểm tra cài đặt máy.");
            }
        }, 8000);

        if ('geolocation' in navigator) {
            // Sử dụng thêm phần cấu hình tối ưu độ chính xác và giảm thiểu việc mất kết nối nền
            const geoOptions = { 
                enableHighAccuracy: true, 
                maximumAge: 0, 
                timeout: 10000 
            };
            gpsWatchId = navigator.geolocation.watchPosition(onGpsUpdate, onGpsError, geoOptions);
        } else {
            document.getElementById('gps-status').innerText = "❌ Thiết bị không hỗ trợ GPS.";
        }
    }

    function onGpsUpdate(position) {
        hasGpsConnected = true;
        clearTimeout(gpsTimeoutWatcher); 
        
        const gpsStatusEl = document.getElementById('gps-status');
        gpsStatusEl.innerText = "📡 GPS Đang Kết Nối Tốt";
        gpsStatusEl.classList.remove('gps-warning');
        document.getElementById('retry-gps-btn').style.display = "none";

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        if (position.coords.speed !== null && position.coords.speed >= 0) {
            currentSpeedKmh = position.coords.speed * 3.6;
        } else {
            currentSpeedKmh = 0; 
        }
        document.getElementById('live-speed').innerText = currentSpeedKmh.toFixed(1);

        if (lastPosition !== null) {
            const dist = calculateDistance(lastPosition.lat, lastPosition.lon, lat, lon);
            if (dist > 0.5) { totalDistanceRun += dist; }
        }
        lastPosition = { lat: lat, lon: lon };
        processExamLogic();
    }

    function onGpsError(error) {
        let errorMsg = "❌ Lỗi định vị GPS (Vui lòng bật Vị trí thiết bị)";
        if(error.code === 1) {
            errorMsg = "❌ Bị từ chối quyền vị trí. Hãy cấp quyền trong cài đặt trình duyệt.";
        }
        document.getElementById('gps-status').innerText = errorMsg;
        document.getElementById('gps-status').classList.remove('gps-warning');
        document.getElementById('retry-gps-btn').style.display = "inline-block";
    }

    function retryGPS() {
        hasGpsConnected = false;
        document.getElementById('gps-status').innerText = "📡 Đang thử kết nối lại GPS...";
        document.getElementById('gps-status').classList.remove('gps-warning');
        startGpsTracking();
    }

    // Tự động kích hoạt luồng quét GPS ban đầu
    startGpsTracking();

    // LỆNH THỰC THI KHI ẤN NÚT BẤM
    function startExam(lessonNum) {
        // Mở khóa âm thanh an toàn bằng luồng im lặng trước
        unlockAudioSystem();

        activeLesson = lessonNum;
        startLessonDistance = totalDistanceRun; 
        startLessonSpeed = currentSpeedKmh;    
        isConditionPassed = false;
        isBeepDone = false;

        for(let i=1; i<=4; i++) {
            document.getElementById(`card-${i}`).classList.remove('active');
        }
        document.getElementById(`card-${lessonNum}`).classList.add('active');

        if(lessonNum === 1) {
            addLog("Bắt đầu: Xuất phát.");
            playCustomAudio(audioFiles.x
